name: AI Auto Search (Scheduled)

on:
  schedule:
    # 每天北京时间 8:00 (UTC 0:00) 和 20:00 (UTC 12:00)
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:  # 允许手动触发测试

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}

jobs:
  ai-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run AI Search
        run: python .github/scripts/ai_search.py

      - name: Report status
        if: always()
        run: echo "AI Search completed at $(date)"
